<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Random Entry, Thiccctionary</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="stylesheet" href="styles.min.css?v=70" />
</head>
<body>
<div class="center-page">
  <p class="error-stamp">Selecting a Random Entry…</p>
  <h2 class="error-headline" style="font-size: 60px;">Loading.</h2>
  <p class="error-body">If you don't get redirected in a moment, <a href="archive.html" style="color: var(--oxblood); border-bottom: 1px solid var(--oxblood);">visit the archive</a>.</p>
</div>
<script>
(async function () {
  try {
    const res = await fetch('data/entries.json', { cache: 'no-store' });
    const entries = await res.json();
    if (!entries.length) { window.location.href = 'archive.html'; return; }
    const pick = entries[Math.floor(Math.random() * entries.length)];
    window.location.href = `entries/${pick.date}.html`;
  } catch (e) {
    window.location.href = 'archive.html';
  }
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  });
}
</script>
<script defer src="/scripts/mobile-nav.js?v=66"></script>
<script defer src="/scripts/ccc-highlight.js?v=2"></script>
<script defer src="/scripts/subscribed-state.js?v=1"></script>
<script>
// Wave 201b: rotating footer tag. 10-line pool, hash-by-date.
(function rotateFooterTag() {
  var els = document.querySelectorAll('.footer-tag');
  if (!els || els.length === 0) return;
  var pool = [
    'Documenting girth, since 2026.',
    'In continuous operation since 1962, or 1971, or shortly after the war.',
    'A daily reference for the physically immoderate.',
    'Six editors. One catalogue. No people.',
    'Reviewed twice. Three times if Margie is in Monaco.',
    'Updated mornings. Filed by lunch. Objected to by 2pm.',
    'Documenting things, never people. We have been clear about this.',
    'The lexicon, properly understood, is the lexicon.',
    'Published from a desk that has been here longer than the building.',
    'Each entry hand-catalogued. Each objection hand-filed.'
  ];
  var d = new Date();
  var dayKey = d.getUTCFullYear() * 1000 + (d.getUTCMonth() + 1) * 50 + d.getUTCDate();
  var pick = pool[dayKey % pool.length];
  els.forEach(function(el) { el.textContent = pick; });
})();
</script>
</body>
</html>

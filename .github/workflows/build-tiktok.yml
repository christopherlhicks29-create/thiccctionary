name: Build TikTok Video

# Generates a 9:16 vertical TikTok video for a given entry: image + typography
# overlay + OpenAI TTS deadpan voiceover (onyx voice).
#
# Three triggers (Wave 75):
#   1. workflow_dispatch (manual) — date input required, MP4 uploaded as artifact only
#   2. push to data/.fire-tiktok — date read from sentinel file, MP4 committed to videos/<date>.mp4
#   3. push to data/.fire-tiktok-latest — uses latest entry on main, MP4 committed
#
# The sentinel triggers exist so the agent can dispatch this workflow without
# needing api.github.com access (sandbox proxy blocks the API).

on:
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD of the entry to build a video for."
        type: string
        required: true
  push:
    branches: [main]
    paths:
      - 'data/.fire-tiktok'
      - 'data/.fire-tiktok-latest'

permissions:
  contents: write

concurrency:
  group: reel-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Resolve target date
        id: target
        run: |
          DATE=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE="${{ inputs.date }}"
            echo "Date source: workflow_dispatch input"
          elif [ -f data/.fire-tiktok ]; then
            DATE=$(grep -v '^#' data/.fire-tiktok | grep -v '^$' | head -n 1 | awk '{print $1}')
            echo "Date source: data/.fire-tiktok"
          elif [ -f data/.fire-tiktok-latest ]; then
            DATE=$(node -e "const e=require('./data/entries.json'); console.log(e[0].date)")
            echo "Date source: latest entry"
          fi
          if [ -z "$DATE" ]; then
            echo "::error::Could not resolve a target date."
            exit 1
          fi
          if ! echo "$DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "::error::Invalid date format: $DATE (expected YYYY-MM-DD)"
            exit 1
          fi
          echo "Target date: $DATE"
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Build TikTok video
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATE: ${{ steps.target.outputs.date }}
        run: node build-tiktok-video.js

      - name: Upload MP4 as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-${{ steps.target.outputs.date }}
          path: tiktok-output/*.mp4
          retention-days: 30

      - name: Commit MP4 to videos/<date>.mp4
        if: github.event_name == 'push'
        env:
          DATE: ${{ steps.target.outputs.date }}
        run: |
          mkdir -p videos
          if ! ls tiktok-output/*.mp4 1>/dev/null 2>&1; then
            echo "::error::No MP4 produced; nothing to commit."
            exit 1
          fi
          mv tiktok-output/*.mp4 "videos/${DATE}.mp4"
          ls -la "videos/${DATE}.mp4"
          git config user.name "Thiccctionary Editorial Board"
          git config user.email "bot@thiccctionary.com"
          git add "videos/${DATE}.mp4"
          if [ -f data/.fire-tiktok ]; then
            rm -f data/.fire-tiktok
            git add -u data/.fire-tiktok
          fi
          if [ -f data/.fire-tiktok-latest ]; then
            rm -f data/.fire-tiktok-latest
            git add -u data/.fire-tiktok-latest
          fi
          git commit -m "Reel: build video for ${DATE} (sentinel-fired)"
          git pull --rebase origin main
          git push origin HEAD:main

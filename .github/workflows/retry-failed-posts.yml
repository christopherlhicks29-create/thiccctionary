name: Retry failed office posts

# Wave 155: runs the retry script that walks data/office-post-queue.json,
# classifies recorded errors, and reposts anything that's transient/schema
# (i.e. likely to succeed now that the underlying code bug is fixed).
#
# Triggers:
#   - hourly cron (passive sweep)
#   - sentinel push (admin button)
#   - workflow_dispatch (manual)

on:
  workflow_dispatch:
  schedule:
    # Hourly at :15 so we don't collide with daily cron at :00
    - cron: '15 * * * *'
  push:
    branches: [main]
    paths:
      - 'data/.fire-retry-posts'

permissions:
  contents: write

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run retry pass
        working-directory: scripts
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
        run: |
          node retry-failed-posts.js

      - name: Clear sentinel + commit queue changes
        run: |
          git config user.name "Thiccctionary Editorial Board"
          git config user.email "bot@thiccctionary.com"
          rm -f data/.fire-retry-posts
          git add data/office-post-queue.json data/.fire-retry-posts 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Retry pass: recovered/updated failed office posts"
            git pull --rebase origin main || true
            git push origin main
          fi

name: Cron watchdog, alert on missing daily entry or Reel

# The daily.yml cron has multiple silent-skip exit paths (picker veto,
# critique gate, OpenAI errors). The Reel pipeline can also silently drop
# the MP4 (Wave 75 path bug). When either happens, no alert fires and the
# gap is discovered days later.
#
# This workflow runs at 14:30 UTC, 90 minutes after daily.yml's 13:00 UTC
# cron, and FAILS LOUD if today's date is missing from data/entries.json
# OR videos/<today>.mp4 doesn't exist. A failed workflow shows a red badge
# on the Actions tab and emails Christopher's GitHub-notifications address.

on:
  schedule:
    - cron: '30 13 * * *'   # 13:30 UTC daily, 90 min after the 12:00 UTC daily cron (Wave 199b)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/.fire-watchdog'        # manual diagnostic fire

permissions:
  contents: read

jobs:
  check-todays-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Verify today's entry exists
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Checking for entry dated $TODAY in data/entries.json..."
          if node -e "
            const e = require('./data/entries.json');
            const today = '$TODAY';
            const found = e.find(x => x.date === today);
            if (!found) {
              console.error('ALERT: No entry for ' + today + '.');
              console.error('Latest entry on file: ' + (e[0]?.date || 'none') + ', ' + (e[0]?.word || ''));
              console.error('');
              console.error('Likely cause: daily.yml cron silently skipped (picker veto, critique gate, or API error).');
              console.error('Recovery options:');
              console.error('  1. Open daily.yml in Actions tab → Run workflow → enable force_regenerate');
              console.error('  2. Touch data/.fire-daily and push to main to fire the daily-via-push trigger');
              console.error('  3. Hand-add an entry to entries.json if AI pipeline keeps failing');
              process.exit(1);
            }
            console.log('OK, entry for ' + today + ' present: ' + found.word);
          "; then
            echo "Entry check passed."
          else
            echo "::error title=Daily cron silent failure (entry missing)::No entry for $TODAY in data/entries.json."
            exit 1
          fi

      - name: Verify yesterday's Reel video exists (Wave 205 fix)
        # Wave 205, Christopher 2026-05-24: changed from TODAY to YESTERDAY.
        # The watchdog fires at 13:30 UTC, but today's reel is built post-merge
        # of the daily PR (hours or even next-day later). Checking for today's
        # reel here always failed. Yesterday's reel has had 24+ hours to land,
        # so a miss there is a real failure.
        run: |
          YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d)
          if [ -f "videos/$YESTERDAY.mp4" ]; then
            SIZE=$(stat -c%s "videos/$YESTERDAY.mp4")
            echo "OK, Reel for $YESTERDAY present: videos/$YESTERDAY.mp4 ($SIZE bytes)"
          else
            echo "::error title=Reel video missing for yesterday::videos/$YESTERDAY.mp4 not on main 24+ hours after entry shipped."
            echo ""
            echo "Likely causes:"
            echo "  1. fire-reel.yml never fired (post-merge sentinel didn't trigger)"
            echo "  2. ffmpeg install failed inside the build"
            echo "  3. OpenAI TTS quota or auth failure"
            echo ""
            echo "Recovery: touch data/.fire-tiktok-latest and push, fire-build-tiktok.yml will rebuild the MP4 and commit it."
            exit 1
          fi

      - name: Cleanup fire-watchdog sentinel (Wave 187a)
        if: always() && github.event_name == 'push' && hashFiles('data/.fire-watchdog') != ''
        run: |
          git config user.name "Thiccctionary Editorial Board"
          git config user.email "bot@thiccctionary.com"
          rm -f data/.fire-watchdog
          git add data/.fire-watchdog
          if ! git diff --cached --quiet; then
            git commit -m "Watchdog consumed fire-watchdog sentinel"
            git pull --rebase origin main || true
            git push origin main || true
          fi

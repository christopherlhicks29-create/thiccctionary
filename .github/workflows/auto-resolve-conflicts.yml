name: Auto-resolve PR conflicts

# When a PR has merge conflicts, attempt to resolve them automatically:
#   1. Field-aware merge of data/entries.json (Wave 148) - text-pipeline PRs
#      keep main's image fields; image-pipeline PRs keep main's text fields;
#      daily PRs splice their new entry on top of main's list.
#   2. Build artifacts (entries/*.html, feed*.xml, sitemap.xml, audits/health-*)
#      regenerated from the merged entries.json.
#
# If conflicts touch any file we don't know how to merge automatically, fall
# back to a PR comment asking for human review.
#
# Triggers manually OR on pull_request synchronize.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to auto-resolve"
        type: number
        required: true
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.head.repo.full_name == github.repository) }}
    steps:
      - name: Determine PR number
        id: pr
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "num=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "num=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect conflicts
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.pr.outputs.num }}
          STATE=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json mergeable,mergeStateStatus -q '.mergeStateStatus')
          BRANCH=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json headRefName -q '.headRefName')
          echo "PR $PR state: $STATE, branch: $BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          if [ "$STATE" = "DIRTY" ]; then
            echo "has_conflict=true" >> $GITHUB_OUTPUT
          else
            echo "has_conflict=false" >> $GITHUB_OUTPUT
            echo "No conflict; nothing to do."
          fi

      - name: Inspect conflicted files
        if: ${{ steps.detect.outputs.has_conflict == 'true' }}
        id: inspect
        run: |
          BRANCH='${{ steps.detect.outputs.branch }}'
          git fetch origin "$BRANCH" main 2>&1 | tail -3
          git checkout -B "fix-$BRANCH" "origin/$BRANCH"

          # Attempt a merge with main; capture conflicts list, then abort
          git merge origin/main --no-commit --no-ff 2>&1 || true
          CONFLICTS=$(git diff --name-only --diff-filter=U | sort -u)
          echo "Conflicts in files:"
          echo "$CONFLICTS"
          echo "$CONFLICTS" > /tmp/conflicts.txt
          git merge --abort 2>/dev/null || true

          # Build-artifact files we can regenerate from entries.json
          ARTIFACT_RE='^(entries/[0-9]{4}-[0-9]{2}-[0-9]{2}\.html|feed\.xml|feed/.*\.xml|sitemap\.xml|audits/health-[0-9]{4}-[0-9]{2}-[0-9]{2}\.md|a-z\.html|index\.html|archive\.html|category/.*\.html|articles/index\.html|categories\.html)$'

          # data/entries.json gets field-aware merge IF the branch is a known pipeline
          SOURCE_OF_TRUTH=$(echo "$CONFLICTS" | grep -E '^data/entries\.json$' || true)
          NON_HANDLED=$(echo "$CONFLICTS" | grep -vE "${ARTIFACT_RE}" | grep -vE '^data/entries\.json$' || true)

          echo "source_of_truth_conflict=$([ -n "$SOURCE_OF_TRUTH" ] && echo true || echo false)" >> $GITHUB_OUTPUT

          if [ -n "$NON_HANDLED" ]; then
            echo "::warning::Conflicts include files we can't auto-merge:"
            echo "$NON_HANDLED"
            echo "safe=false" >> $GITHUB_OUTPUT
          else
            echo "All conflicts auto-resolvable."
            echo "safe=true" >> $GITHUB_OUTPUT
          fi

      - name: Field-aware merge + rebuild + force-push
        if: ${{ steps.detect.outputs.has_conflict == 'true' && steps.inspect.outputs.safe == 'true' }}
        run: |
          BRANCH='${{ steps.detect.outputs.branch }}'
          git config user.name "Thiccctionary Editorial Board"
          git config user.email "bot@thiccctionary.com"

          # Reset to PR branch, then merge main with conflict markers
          git checkout -B "fix-$BRANCH" "origin/$BRANCH"
          git merge origin/main --no-commit --no-ff || true

          # Resolve data/entries.json with the field-aware resolver
          if [ -f data/entries.json ] && git diff --name-only --diff-filter=U | grep -qx "data/entries.json"; then
            echo "Running field-aware entries.json resolver for $BRANCH..."
            if node scripts/resolve-entries-json-conflict.js "$BRANCH"; then
              git add data/entries.json
              echo "✅ entries.json resolved."
            else
              echo "::error::Field-aware resolver refused to merge entries.json. Aborting."
              git merge --abort 2>/dev/null || true
              exit 1
            fi
          fi

          # For artifact conflicts, take 'theirs' (main's regenerated version)
          # then we'll rebuild from the merged entries.json below
          REMAINING=$(git diff --name-only --diff-filter=U 2>/dev/null)
          if [ -n "$REMAINING" ]; then
            echo "Taking main's version for build artifacts:"
            echo "$REMAINING"
            for f in $REMAINING; do
              git checkout --theirs "$f"
              git add "$f"
            done
          fi

          # Commit the merge
          if git diff --staged --quiet; then
            echo "No changes staged (merge was clean enough)."
          else
            git commit -m "Auto-merge main into $BRANCH (field-aware entries.json + rebuilt artifacts)"
          fi

          # Now rebuild artifacts from the resolved entries.json
          if [ -f scripts/build-entry-pages.js ]; then
            node scripts/build-entry-pages.js 2>&1 | tail -10 || true
          fi
          if [ -f scripts/build-feeds.js ]; then
            node scripts/build-feeds.js 2>&1 | tail -10 || true
          fi
          if [ -f scripts/build-archive.js ]; then
            node scripts/build-archive.js 2>&1 | tail -10 || true
          fi

          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Auto-resolve: rebuild artifacts from merged entries.json"
          fi

          git push --force origin "HEAD:$BRANCH"

      - name: Comment on PR (resolved)
        if: ${{ steps.detect.outputs.has_conflict == 'true' && steps.inspect.outputs.safe == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr.outputs.num }} --repo "$GITHUB_REPOSITORY" \
            --body "Auto-resolver merged main + rebuilt artifacts. Conflicts cleared. Ready to merge."

      - name: Comment on PR (manual review needed)
        if: ${{ steps.detect.outputs.has_conflict == 'true' && steps.inspect.outputs.safe == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.pr.outputs.num }} --repo "$GITHUB_REPOSITORY" \
            --body "Auto-resolver detected conflicts in files it can't merge automatically. Manual review required. See workflow logs for the file list."

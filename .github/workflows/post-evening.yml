name: Post Evening (Archive Throwback)

# Posts a random older entry from the archive to all 3 platforms.
# Runs daily at 03:00 UTC = 9pm Mountain Time / 11pm Eastern (previous day).

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post to Facebook (direct, no Buffer attribution)


        working-directory: scripts


        continue-on-error: true


        env:


          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}


          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}


          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}


          POST_MODE: evening


        run: node post-to-facebook.js



      - name: Post to Buffer (evening)
        working-directory: scripts
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          POST_MODE: evening
          SKIP_FACEBOOK: 'true'
        run: node post-to-buffer.js

name: Fire Reel cross-post (standalone)

# Cross-posts a single day's Reel video to FB + IG via Buffer, WITHOUT
# re-sending the newsletter or re-posting the image. Used when the Reel
# video is added AFTER the daily PR was merged (so post-on-merge already
# fired its image+newsletter steps but skipped the Reel because the MP4
# didn't exist yet).
#
# Triggers (Wave 76):
#   1. workflow_dispatch (manual) with date input
#   2. push to data/.fire-reel — date read from sentinel file
#   3. push to data/.fire-reel-latest — uses latest entry on main

on:
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD of the entry to cross-post (must have videos/<date>.mp4 on main)."
        type: string
        required: true
  push:
    branches: [main]
    paths:
      - 'data/.fire-reel'
      - 'data/.fire-reel-latest'

permissions:
  contents: write   # to clear sentinels after fire

jobs:
  cross-post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve target date
        id: target
        run: |
          DATE=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE="${{ inputs.date }}"
          elif [ -f data/.fire-reel ]; then
            DATE=$(grep -v '^#' data/.fire-reel | grep -v '^$' | head -n 1 | awk '{print $1}')
          elif [ -f data/.fire-reel-latest ]; then
            DATE=$(node -e "const e=require('./data/entries.json'); console.log(e[0].date)")
          fi
          if [ -z "$DATE" ]; then
            echo "::error::Could not resolve a target date."
            exit 1
          fi
          if ! echo "$DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "::error::Invalid date format: $DATE"
            exit 1
          fi
          if [ ! -f "videos/$DATE.mp4" ]; then
            echo "::error::No videos/$DATE.mp4 on main. Build the Reel first."
            exit 1
          fi
          echo "Cross-posting Reel for $DATE"
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Post Reel to Buffer (FB + IG)
        working-directory: scripts
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          POST_MODE: reels
          REEL_DATE: ${{ steps.target.outputs.date }}
        run: node post-to-buffer.js

      - name: Clear sentinel files
        if: github.event_name == 'push'
        run: |
          git config user.name "Thiccctionary Editorial Board"
          git config user.email "bot@thiccctionary.com"
          changed=false
          if [ -f data/.fire-reel ]; then rm -f data/.fire-reel; git add -u data/.fire-reel; changed=true; fi
          if [ -f data/.fire-reel-latest ]; then rm -f data/.fire-reel-latest; git add -u data/.fire-reel-latest; changed=true; fi
          if [ "$changed" = "true" ]; then
            git commit -m "Reel cross-post fired for ${{ steps.target.outputs.date }} (sentinel cleared)"
            git push origin HEAD:main
          fi

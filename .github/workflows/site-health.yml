name: Site health audit

on:
  schedule:
    # Every Sunday at 14:00 UTC (~7am MT, ~9am ET)
    - cron: '0 14 * * 0'
  workflow_dispatch:
    # Allow manual runs from the Actions tab
  push:
    branches: [main]
    paths:
      - 'scripts/site-health.js'
      # Re-audit when site-health logic changes

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run site-health audit
        run: node scripts/site-health.js
        # Always exits 0 for the report-writing run; --check mode is for gating

      - name: Commit audit report
        run: |
          DATE=$(date -u +%Y-%m-%d)
          REPORT="audits/health-${DATE}.md"
          if [ ! -f "$REPORT" ]; then
            echo "No report file produced; skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$REPORT"
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          # Pull issue count from the report
          ISSUE_COUNT=$(grep -oP '\d+ issues? found' "$REPORT" | head -1 || echo "0 issues")
          STATUS=$(grep -oP '✅ Clean|⚠️ \d+ issues? found' "$REPORT" | head -1 || echo "?")
          git commit -m "Site health audit (${DATE}): ${STATUS}

          Auto-generated by .github/workflows/site-health.yml.
          See ${REPORT} for the full report."
          git push origin main

name: Site health audit

on:
  schedule:
    # Every Sunday at 14:00 UTC (~7am MT, ~9am ET)
    - cron: '0 14 * * 0'
  workflow_dispatch:
    # Allow manual runs from the Actions tab
  push:
    branches: [main]
    paths:
      # Re-audit when site-health logic changes
      - 'scripts/site-health.js'
      # OR when any content/code that the audit covers changes
      - 'scripts/banned-words.js'
      - 'data/entries.json'
      - 'data/articles.json'
      - 'entries/**'
      - 'articles/**'
      - 'index.html'
      - 'archive.html'
      - 'submit.html'
      - 'thanks.html'
      - 'thiccc/**'
      - 'press/**'
      - 'rate/**'
      - 'legal/**'
      - 'sitemap.xml'
      - 'feed.xml'
      - 'feed/**'
      - '404.html'
      - 'tags/**'
      - 'compare.html'
      - 'random.html'
      - 'embed/**'
      - 'api/**'
      - 'v/**'
      - 'foreword-journal/**'
      - 'prints/**'
      - '!audits/**'  # Avoid loop: don't re-run when the audit's own report commits

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run site-health audit
        run: node scripts/site-health.js
        # Always exits 0 for the report-writing run; --check mode is for gating

      - name: Auto-fix known issues
        run: node scripts/site-health-autofix.js

      - name: Re-run audit after auto-fix
        run: node scripts/site-health.js
        continue-on-error: true

      - name: Commit audit + autofix
        run: |
          DATE=$(date -u +%Y-%m-%d)
          REPORT="audits/health-${DATE}.md"
          if [ ! -f "$REPORT" ]; then
            echo "No report file produced; skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          AUTOFIX="audits/health-autofix-${DATE}.md"
          git add "$REPORT" "$AUTOFIX" data/entries.json articles/ about/ entries/ thiccc/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          # Pull issue count from the report
          ISSUE_COUNT=$(grep -oP '\d+ issues? found' "$REPORT" | head -1 || echo "0 issues")
          STATUS=$(grep -oP '✅ Clean|⚠️ \d+ issues? found' "$REPORT" | head -1 || echo "?")
          git commit -m "Site health audit (${DATE}): ${STATUS}

          Auto-generated by .github/workflows/site-health.yml.
          See ${REPORT} for the full report."
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then break; fi
            sleep $((i*3))
          done
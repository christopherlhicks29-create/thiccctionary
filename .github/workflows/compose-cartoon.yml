name: Compose Cartoon Episode

# Wave 191: stitches Higgsfield video clips + OpenAI TTS narration into a
# finished vertical cartoon episode. Triggered manually with a manifest path,
# or via sentinel file push at data/.fire-cartoon.
#
# Wave 191b: self-documenting. Every run (success OR failure) commits a
# full log to audits/cartoon-runs/<stamp>.log so debugging never requires
# clicking through GitHub Actions UI again.

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Path to cartoon manifest (e.g. data/cartoons/ep00-welcome.json)"
        required: true
        default: "data/cartoons/ep00-welcome.json"
  push:
    branches: [main]
    paths:
      - "data/.fire-cartoon"

permissions:
  contents: write

jobs:
  compose:
    runs-on: ubuntu-latest
    concurrency:
      group: cartoon-compose
      cancel-in-progress: false
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve manifest path + run stamp
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MANIFEST="${{ github.event.inputs.manifest }}"
          else
            # Sentinel push: read the manifest path from data/.fire-cartoon
            MANIFEST=""
            if [ -f data/.fire-cartoon ]; then
              MANIFEST=$(head -n 1 data/.fire-cartoon | tr -d '[:space:]')
            fi
            if [ -z "$MANIFEST" ]; then
              MANIFEST="data/cartoons/ep00-welcome.json"
            fi
          fi
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          echo "manifest=$MANIFEST" >> $GITHUB_OUTPUT
          echo "stamp=$STAMP" >> $GITHUB_OUTPUT
          echo "logfile=audits/cartoon-runs/${STAMP}.log" >> $GITHUB_OUTPUT
          mkdir -p audits/cartoon-runs
          echo "Using manifest: $MANIFEST"
          echo "Log will commit to: audits/cartoon-runs/${STAMP}.log"
          ls -la "$MANIFEST" || echo "WARN: manifest missing"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow + ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          python3 -m pip install --quiet Pillow

      - name: Compose cartoon (captured to log)
        id: compose
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          LOG="${{ steps.resolve.outputs.logfile }}"
          mkdir -p "$(dirname "$LOG")"
          {
            echo "# Compose cartoon run ${{ steps.resolve.outputs.stamp }}"
            echo "# Manifest: ${{ steps.resolve.outputs.manifest }}"
            echo "# Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
          } > "$LOG"
          set +e
          python3 -u scripts/compose-cartoon.py "${{ steps.resolve.outputs.manifest }}" 2>&1 | tee -a "$LOG"
          RC=${PIPESTATUS[0]}
          set -e
          echo "" >> "$LOG"
          echo "# exit_code: $RC" >> "$LOG"
          echo "exit_code=$RC" >> $GITHUB_OUTPUT
          if [ "$RC" -ne 0 ]; then
            echo "::error::Compose script exited with code $RC. See $LOG for details."
          fi

      - name: Inspect output (if produced)
        if: always()
        run: |
          ls -la videos/cartoons/ 2>/dev/null || echo "(no videos/cartoons/)"
          for f in videos/cartoons/*.mp4; do
            [ -f "$f" ] || continue
            echo "===== $f ====="
            ffprobe -v error -show_entries format=duration,size:stream=width,height,codec_name "$f" || true
          done

      - name: Commit log (always) + video (if produced)
        if: always()
        run: |
          set -e
          git config user.name "Thiccctionary Cartoon Bot"
          git config user.email "bot@thiccctionary.com"
          if [ -f data/.fire-cartoon ]; then
            git rm -f data/.fire-cartoon || true
          fi
          # Always stage the log
          git add "${{ steps.resolve.outputs.logfile }}" || true
          # Stage any produced video
          if [ -d videos/cartoons ] && [ -n "$(ls -A videos/cartoons 2>/dev/null)" ]; then
            git add videos/cartoons/ || true
          fi
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            RC="${{ steps.compose.outputs.exit_code }}"
            STATUS="ok"
            if [ "$RC" != "0" ] && [ -n "$RC" ]; then STATUS="FAIL($RC)"; fi
            git commit -m "Cartoon compose ${{ steps.resolve.outputs.stamp }} [$STATUS] (${{ steps.resolve.outputs.manifest }})" || true
            # Retry push with rebase if remote moved
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then
                echo "Pushed on attempt $i"
                break
              fi
              sleep $((i*5))
            done
          fi

      - name: Fail the job if compose failed
        if: always() && steps.compose.outputs.exit_code != '0' && steps.compose.outputs.exit_code != ''
        run: |
          echo "Compose script exited ${{ steps.compose.outputs.exit_code }}."
          exit 1

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Cartoon Compose"
            echo "**Manifest:** \`${{ steps.resolve.outputs.manifest }}\`"
            echo "**Log committed to:** \`${{ steps.resolve.outputs.logfile }}\`"
            echo "**Exit code:** \`${{ steps.compose.outputs.exit_code }}\`"
            echo ""
            if ls videos/cartoons/*.mp4 1>/dev/null 2>&1; then
              for f in videos/cartoons/*.mp4; do
                SIZE=$(stat -c%s "$f")
                DUR=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$f" 2>/dev/null || echo "?")
                echo "- \`$f\` $((SIZE/1024)) KB, ${DUR}s"
              done
            else
              echo "_No output MP4s found._"
            fi
          } >> $GITHUB_STEP_SUMMARY

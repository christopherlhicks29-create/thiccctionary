name: Regenerate Text (Backfill Old Entries)

# Re-runs the entry-text generation for existing entries WITHOUT changing
# the image. Useful when entry text is weak but the image is fine, or after
# tuning the entry-gen prompt.
# Manual-trigger only. Opens a single PR with all updates for review.

on:
  workflow_dispatch:
    inputs:
      dates:
        description: "Required. Comma-separated YYYY-MM-DD dates to regenerate text for."
        type: string
        required: true
      word_override:
        description: "Optional. Replace the headword with this string. Only valid when 'dates' contains a single date. Use to upgrade weak headwords (e.g. 'Bulky Refrigerator' -> 'Frigidaire, Side-by-Side')."
        type: string
        default: ""
  push:
    paths:
      - 'data/.fire-text-regen.json'
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read sentinel file (push triggers only)
        id: sentinel
        if: github.event_name == 'push'
        run: |
          if [ -f data/.fire-text-regen.json ]; then
            DATES=$(python3 -c "import json; print(json.load(open('data/.fire-text-regen.json')).get('dates',''))")
            WORD=$(python3 -c "import json; print(json.load(open('data/.fire-text-regen.json')).get('word_override',''))")
            echo "dates=${DATES}" >> $GITHUB_OUTPUT
            echo "word_override=${WORD}" >> $GITHUB_OUTPUT
          fi

      - name: Delete sentinel file (push triggers only)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f data/.fire-text-regen.json
          git add -A
          git diff --staged --quiet || git commit -m "Consume text-regen sentinel"
          git push origin main || true

      - name: Regenerate text
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATES: ${{ inputs.dates || steps.sentinel.outputs.dates }}
          WORD_OVERRIDE: ${{ inputs.word_override || steps.sentinel.outputs.word_override }}
        run: node regenerate-text.js

      - name: Open Pull Request
        id: open_pr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Regenerate entry text for older entries"
          branch: regenerate-text/${{ github.run_id }}
          delete-branch: true
          title: "✏️ Regenerated text — ${{ inputs.dates }}${{ inputs.word_override && format(' [word: {0}]', inputs.word_override) || '' }}"
          body: |
            **What this PR does:** re-runs the satirical entry-text generation on existing entries. Image, photographer, and date are preserved; definitions, etymology, example, pronunciation, caption, and tags are all replaced.

            **Dates processed:** `${{ inputs.dates }}`
            **Word override:** `${{ inputs.word_override }}` *(empty = keep original headword)*

            Review the **Files changed** tab — read the new copy on each entry. If a regenerated entry still looks weak, you can:
            - Close this PR (no changes go to main)
            - Or merge as-is and re-run the workflow on the same date for another shot

            **To merge:** Squash and merge as usual.

      - name: Auto-merge when fired from admin (push event)
        if: success() && github.event_name == 'push' && steps.open_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.open_pr.outputs.pull-request-number }}
          echo "Auto-merging admin-fired PR #$PR..."
          gh pr merge "$PR" --squash --auto --delete-branch --repo "$GITHUB_REPOSITORY" || gh pr merge "$PR" --squash --delete-branch --repo "$GITHUB_REPOSITORY" || echo "::warning::auto-merge failed"

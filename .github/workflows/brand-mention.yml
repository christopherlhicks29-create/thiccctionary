name: Brand mention monitor (daily)

# Polls Reddit + HackerNews for mentions of "thiccctionary" (and the
# inevitable misspelling). Writes audits/brand-mentions/<date>.md with
# new mentions highlighted. Free, no auth, ~$0/run.
#
# Cadence: daily 13:00 UTC.
# Manual fire: data/.fire-brand-mention sentinel, or workflow_dispatch.

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/.fire-brand-mention'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Poll Reddit + HackerNews
        run: node scripts/brand-mention-check.js

      - name: Commit report + clear sentinel
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "Brand Mention Monitor"
          if [ -f data/.fire-brand-mention ]; then
            git rm -f data/.fire-brand-mention || true
          fi
          git add audits/brand-mentions/ || true
          if ! git diff --staged --quiet; then
            git commit -m "Brand mention report $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then break; fi
              sleep $((i*3))
            done
          fi

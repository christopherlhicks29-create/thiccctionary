name: Post Afternoon (Manual Only, Disabled by Default)

# Reserved workflow for future afternoon posting.
# CURRENTLY DISABLED, only runs when manually triggered via Actions tab.
# To re-enable scheduled afternoon posts, uncomment the schedule block below.
# Christopher decided to run 2x/day (morning + evening) to avoid same-image reuse.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 21 * * *'   # 21:00 UTC = 3pm Mountain

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post to Buffer (afternoon)
        working-directory: scripts
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          POST_MODE: afternoon
        run: node post-to-buffer.js

name: Field Report, Auto-Publish (3x/week random)

# Cadence: 3x/week random. Cron fires daily at 14:00 UTC, but the script
# exits early ~57% of the time so the effective output averages 3 per week.
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      theme_override:
        description: "Optional theme to force"
        type: string
        required: false
      target_date:
        description: "Override target date (YYYY-MM-DD)"
        type: string
        required: false
  push:
    branches: [main]
    paths:
      - 'data/.fire-weekly'

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve target date
        id: target
        run: |
          if [ -n "${{ inputs.target_date }}" ]; then
            DATE="${{ inputs.target_date }}"
          elif [ -f data/.fire-weekly ]; then
            FIRE=$(tr -d '[:space:]' < data/.fire-weekly)
            if [ -n "$FIRE" ]; then DATE="$FIRE"; else DATE=$(date -u +%Y-%m-%d); fi
          else
            DATE=$(date -u +%Y-%m-%d)
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Random cadence gate (3x/week average)
        id: gate
        run: |
          # Skip ~57% of runs to average 3/week. Manual workflow_dispatch always runs.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "manual trigger, skipping random gate"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROLL=$((RANDOM % 100))
          THRESHOLD=43
          if [ "$ROLL" -lt "$THRESHOLD" ]; then
            echo "rolled $ROLL < $THRESHOLD, proceeding"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "rolled $ROLL >= $THRESHOLD, skipping (no article today)"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Field Report (4-pass quality gate, >=8/10 required)
        id: gen
        if: steps.gate.outputs.proceed == 'true'
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THEME_OVERRIDE: ${{ inputs.theme_override }}
          TARGET_DATE: ${{ steps.target.outputs.date }}
        run: |
          set +e
          node generate-weekly-article.js 2>&1 | tee /tmp/gen.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Clean up sentinel
        if: always() && hashFiles('data/.fire-weekly') != ''
        run: rm -f data/.fire-weekly

      - name: On success commit and push to main
        if: steps.gen.outputs.exit == '0'
        run: |
          TITLE=$(python3 -c "import json; print(json.load(open('data/articles.json'))[0]['title'])")
          git config user.email "actions@github.com"
          git config user.name "Thiccctionary Field Reporter (auto)"
          git add -A
          git commit -m "Wave 109 auto-publish: ${TITLE}" || echo "nothing to commit"
          git push origin main

      - name: On failure open issue
        if: steps.gen.outputs.exit != '0'
        uses: actions/github-script@v7
        env:
          TARGET_DATE: ${{ steps.target.outputs.date }}
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/gen.log', 'utf8').slice(-3000);
            const date = process.env.TARGET_DATE;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Weekly Field Report: quality gate failed for ' + date,
              body: 'The Field Report generator burned through 4 critique passes without clearing the >=8/10 quality bar. No article published this week.\n\n**Date:** ' + date + '\n\n**Last 3KB of run log:**\n\n<pre>' + log.replace(/</g, '&lt;') + '</pre>\n\nRe-fire manually after inspecting prompt/critique, or wait for next Sunday.',
              labels: ['weekly-field-report', 'quality-gate-fail']
            });

      - name: Commit sentinel removal if needed
        if: always()
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "tree clean"
          else
            git config user.email "actions@github.com"
            git config user.name "Thiccctionary Field Reporter (auto)"
            git add -A
            git commit -m "Clean up .fire-weekly sentinel" || true
            git push origin main || true
          fi

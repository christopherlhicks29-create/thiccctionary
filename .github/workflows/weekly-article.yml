name: Weekly Field Report — Generate Draft PR

# Generates a 700-1000 word Field Report essay every Sunday at 14:00 UTC,
# threading recent daily entries into a single piece. Opens a PR for review
# before publishing — articles are higher-stakes than daily entries, no auto-merge.

on:
  schedule:
    - cron: '0 14 * * SUN'
  workflow_dispatch:
    inputs:
      theme_override:
        description: "Optional theme to force"
        type: string
        required: false
      target_date:
        description: "Override target date (YYYY-MM-DD), defaults to today UTC"
        type: string
        required: false
  push:
    branches: [main]
    paths:
      - 'data/.fire-weekly'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve target date
        id: target
        run: |
          if [ -n "${{ inputs.target_date }}" ]; then
            DATE="${{ inputs.target_date }}"
          elif [ -f data/.fire-weekly ]; then
            FIRE=$(tr -d '[:space:]' < data/.fire-weekly)
            if [ -n "$FIRE" ]; then DATE="$FIRE"; else DATE=$(date -u +%Y-%m-%d); fi
          else
            DATE=$(date -u +%Y-%m-%d)
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Generate this week's Field Report
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          THEME_OVERRIDE: ${{ inputs.theme_override }}
          TARGET_DATE: ${{ steps.target.outputs.date }}
        run: node generate-weekly-article.js

      - name: Read generated article metadata
        id: meta
        run: |
          SLUG=$(python3 -c "import json; print(json.load(open('data/articles.json'))[0]['slug'])")
          TITLE=$(python3 -c "import json; print(json.load(open('data/articles.json'))[0]['title'])")
          DESC=$(python3 -c "import json; print(json.load(open('data/articles.json'))[0]['description'])")
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          { echo "desc<<DESCEOF"; echo "$DESC"; echo "DESCEOF"; } >> "$GITHUB_OUTPUT"

      - name: Clean up sentinel
        if: hashFiles('data/.fire-weekly') != ''
        run: rm -f data/.fire-weekly

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: weekly/${{ steps.target.outputs.date }}
          commit-message: "Weekly Field Report: ${{ steps.meta.outputs.title }}"
          title: "📰 Field Report — ${{ steps.meta.outputs.title }}"
          body: |
            **Slug:** `${{ steps.meta.outputs.slug }}`
            **Date:** ${{ steps.target.outputs.date }}

            **Description:**
            > ${{ steps.meta.outputs.desc }}

            ---

            ## Review checklist
            - [ ] Tone matches Field Report voice (Bagger 288 / Physics of Thiccc anchors)
            - [ ] No fabricated numbers — every figure verifiable
            - [ ] Recent entries linked correctly
            - [ ] Headline & dek land
            - [ ] No "as an AI" / fourth-wall breaks
            - [ ] Related-entry sidebar points to the right entry

            Merge to publish. Close without merging to discard.

            🤖 Generated by `.github/workflows/weekly-article.yml`
          delete-branch: true
          add-paths: |
            articles/**
            data/articles.json
            index.html

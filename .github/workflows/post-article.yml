name: Post Article (Long-form Promo)

# Promotes one long-form article from data/articles.json to all 3 platforms,
# rotating through the catalog by ISO week (~10-week cycle for 10 articles).
# Uses the per-article OG card as the image. This is the only social pipeline
# that points back to the /articles/ section — daily entry posts already cover
# the dictionary side.
#
# Runs every Friday at 16:00 UTC = ~10am Mountain / 12pm Eastern. Picks Friday
# because article reads index toward the weekend (more long-form-friendly).

on:
  schedule:
    - cron: '0 16 * * 5'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post to Buffer (article)
        working-directory: scripts
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          POST_MODE: article
        run: node post-to-buffer.js

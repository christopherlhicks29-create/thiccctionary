name: Regenerate Entry (past date)

# Force-regenerates one or more PAST-dated entries to fresh subjects.
# Triggered by pushing data/.regen-entry whose lines are target dates
# (YYYY-MM-DD, one per line). generate-daily.js already honors TARGET_DATE;
# this workflow loops the dates, rebuilds ALL entry pages so prev/next nav is
# correct for the mid-array entries, runs the editorial-sanity gate, then
# commits straight to main (no PR). Solves the "regenerate a past entry" gap.
on:
  push:
    branches: [main]
    paths:
      - 'data/.regen-entry'

permissions:
  contents: write

concurrency:
  group: regen-entry
  cancel-in-progress: false

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install libwebp-tools (for WebP variant)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq webp

      - name: Validate sentinel
        id: dates
        run: |
          if [ ! -s data/.regen-entry ]; then
            echo "No data/.regen-entry sentinel or it is empty; nothing to do."
            echo "have=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Each non-comment line: "YYYY-MM-DD" or "YYYY-MM-DD | Subject | unsplash query".
          # Comment lines (leading #) and blanks are ignored. We parse the file
          # directly in the regen step so a date appearing in a comment cannot be
          # picked up (the leading-# filter is the guard).
          COUNT=$(grep -vE '^[[:space:]]*#' data/.regen-entry | grep -cE '^[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)
          echo "Valid date lines: $COUNT"
          grep -vE '^[[:space:]]*#' data/.regen-entry | grep -E '^[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2}' || true
          if [ "$COUNT" -eq 0 ]; then
            echo "Sentinel present but contains no valid date lines."
            echo "have=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "have=true" >> "$GITHUB_OUTPUT"

      - name: Regenerate each target date
        if: steps.dates.outputs.have == 'true'
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          FORCE_REGENERATE: 'true'
        run: |
          set +e
          # Parse the sentinel line by line. Format per line:
          #   YYYY-MM-DD
          #   YYYY-MM-DD | Subject Here | optional unsplash query
          # Leading-# comment lines and blanks are skipped, so a date in a
          # comment can never be regenerated.
          grep -vE '^[[:space:]]*#' ../data/.regen-entry | while IFS='|' read -r f1 f2 f3; do
            D=$(echo "$f1" | tr -d '[:space:]')
            case "$D" in
              [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]) ;;
              *) continue ;;
            esac
            SUBJ=$(echo "$f2" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            echo "=============================================="
            echo "Regenerating entry for $D ${SUBJ:+(subject override: $SUBJ)}"
            echo "=============================================="
            if [ -n "$SUBJ" ]; then
              TARGET_DATE="$D" SUBJECT_OVERRIDE="$SUBJ" node generate-daily-with-retry.js 2>&1 | tee "/tmp/regen-$D.log"
            else
              TARGET_DATE="$D" node generate-daily-with-retry.js 2>&1 | tee "/tmp/regen-$D.log"
            fi
            echo "::notice::regen $D exit=${PIPESTATUS[0]}"
          done

      - name: Rebuild all entry pages + IS pages (fix nav + sitemap)
        if: steps.dates.outputs.have == 'true'
        run: |
          node scripts/build-entry-pages.js
          node scripts/build-is-pages.js || echo "::warning::build-is-pages had a non-zero exit (non-fatal)"

      - name: Editorial-sanity gate
        if: steps.dates.outputs.have == 'true'
        run: |
          node scripts/editorial-sanity.js | tee /tmp/sanity.log
          if grep -qE '[1-9][0-9]* RED' /tmp/sanity.log; then
            echo "::error::editorial-sanity reported RED issues. Not committing."
            exit 1
          fi

      - name: Clear sentinel + commit to main
        if: steps.dates.outputs.have == 'true'
        run: |
          rm -f data/.regen-entry
          git config user.email "actions@github.com"
          git config user.name "Regenerate Entry (auto)"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed; not committing."
            exit 0
          fi
          git commit -m "Regenerate past entries (sentinel-directed)"
          for i in 1 2 3; do
            git pull --rebase origin main 2>&1 | tail -3 || true
            if git push origin main 2>&1; then echo "pushed"; break; fi
            sleep $((i*3))
          done

      - name: Always remove sentinel even on failure
        if: always()
        run: |
          if [ -f data/.regen-entry ]; then
            rm -f data/.regen-entry
            git config user.email "actions@github.com"
            git config user.name "Regenerate Entry (auto)"
            git add data/.regen-entry
            git commit -m "Clear .regen-entry sentinel (post-run cleanup)" || true
            for i in 1 2 3; do
              git pull --rebase origin main 2>&1 | tail -3 || true
              if git push origin main 2>&1; then break; fi
              sleep $((i*3))
            done
          fi

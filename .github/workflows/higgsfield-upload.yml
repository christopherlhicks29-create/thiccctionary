name: Higgsfield Upload Helper

# Wave 193: bridge helper for Higgsfield audio uploads. The presigned upload
# URL from media_upload is on cloudfront.net, which the cowork sandbox can
# not reach. This workflow runs on a GitHub runner (full network) and PUTs
# bytes from a repo file to the presigned URL.
#
# Sentinel format at data/.fire-higgsfield-upload:
#   line 1: presigned PUT URL (full URL, including query string)
#   line 2: repo-relative path to file to upload (e.g. data/cartoons/audio/ep00-welcome/hugh_cold_open.mp3)
#   line 3: content type (e.g. audio/mpeg)
#
# Result is logged to audits/higgsfield-upload-runs/<stamp>.log .

on:
  push:
    branches: [main]
    paths:
      - "data/.fire-higgsfield-upload"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Read sentinel + upload
        id: upload
        run: |
          set -e
          mkdir -p audits/higgsfield-upload-runs
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          LOG="audits/higgsfield-upload-runs/${STAMP}.log"
          echo "stamp=$STAMP" >> $GITHUB_OUTPUT
          echo "logfile=$LOG" >> $GITHUB_OUTPUT
          {
            echo "# Higgsfield upload helper run $STAMP"
            echo "# Triggered by sentinel push"
            echo ""
          } > "$LOG"

          if [ ! -f data/.fire-higgsfield-upload ]; then
            echo "::error::Sentinel file missing"
            echo "FAIL: sentinel missing" >> "$LOG"
            exit 1
          fi

          URL=$(sed -n '1p' data/.fire-higgsfield-upload)
          FILEPATH=$(sed -n '2p' data/.fire-higgsfield-upload)
          CTYPE=$(sed -n '3p' data/.fire-higgsfield-upload)
          [ -z "$CTYPE" ] && CTYPE="application/octet-stream"

          echo "URL host: $(echo "$URL" | sed 's|.*//\([^/]*\)/.*|\1|')" | tee -a "$LOG"
          echo "FILE: $FILEPATH" | tee -a "$LOG"
          echo "CTYPE: $CTYPE" | tee -a "$LOG"

          if [ ! -f "$FILEPATH" ]; then
            echo "::error::File missing at $FILEPATH"
            echo "FAIL: file missing" >> "$LOG"
            exit 1
          fi

          SIZE=$(stat -c%s "$FILEPATH")
          echo "SIZE: $SIZE bytes" | tee -a "$LOG"

          echo "PUTting..." | tee -a "$LOG"
          HTTP=$(curl -sS -o /tmp/upload-resp.txt -w "%{http_code}" \
            -X PUT \
            -H "Content-Type: $CTYPE" \
            --data-binary "@$FILEPATH" \
            "$URL")
          echo "HTTP $HTTP" | tee -a "$LOG"
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "204" ]; then
            echo "::error::Upload failed with HTTP $HTTP"
            cat /tmp/upload-resp.txt | tee -a "$LOG"
            echo "exit_code=1" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "Upload OK" | tee -a "$LOG"
          echo "exit_code=0" >> $GITHUB_OUTPUT

      - name: Commit log + clear sentinel
        if: always()
        run: |
          git config user.name "Thiccctionary Upload Bot"
          git config user.email "bot@thiccctionary.com"
          if [ -f data/.fire-higgsfield-upload ]; then
            git rm -f data/.fire-higgsfield-upload || true
          fi
          git add "${{ steps.upload.outputs.logfile }}" || true
          if ! git diff --staged --quiet; then
            git commit -m "Higgsfield upload helper ${{ steps.upload.outputs.stamp }} [exit ${{ steps.upload.outputs.exit_code }}]" || true
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then break; fi
              sleep $((i*3))
            done
          fi

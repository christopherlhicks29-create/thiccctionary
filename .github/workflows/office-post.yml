name: Office Post, staff social (2 slots/day ~85%, 7/10 quality gate)

# Wave 118: extra social post bylined by an editorial staff member, on top of
# the existing 3x/day cadence. Topic is an office running bit, a personal
# off-duty lane (Wave 274), a reply, or a recent thiccc subject. Claude
# writes, rater scores 0-10. ≥7 publishes, <7 silently skips.
# Wave 274: two daily slots (17:30 + 21:15 UTC, midday + late-afternoon ET)
# with an 85% random gate each. Christopher 2026-07-03: "need more social
# media posts that are more personal from the employees."

on:
  schedule:
    - cron: '30 17 * * *'
    - cron: '15 21 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/.fire-office'
    inputs:
      byline_override:
        description: "Force a byline: eli|teddy|bart|margie|spider|hugh"
        type: string
        required: false
      topic_kind:
        description: "Topic kind: office|thiccc|personal|reply|either"
        type: string
        required: false
        default: either
      dry_run:
        description: "Dry run (skip Buffer + queue write)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse sentinel (if push-triggered with payload)
        id: sentinel
        run: |
          if [ -f data/.fire-office ]; then
            CONTENT=$(cat data/.fire-office)
            # Try JSON first; fall back to plain date
            BYLINE=$(echo "$CONTENT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('byline_override',''))" 2>/dev/null || echo "")
            TOPIC=$(echo "$CONTENT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('topic_kind','either'))" 2>/dev/null || echo "either")
            if [ -n "$BYLINE" ]; then echo "byline=$BYLINE" >> "$GITHUB_OUTPUT"; fi
            echo "topic=$TOPIC" >> "$GITHUB_OUTPUT"
            echo "Parsed sentinel: byline=$BYLINE topic=$TOPIC"
          fi

      - name: Random cadence gate (~85%)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "manual trigger"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROLL=$((RANDOM % 100))
          if [ "$ROLL" -lt 85 ]; then
            echo "rolled $ROLL < 85, proceeding"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "rolled $ROLL >= 85, skipping this slot"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node 20
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate office post + rate
        id: gen
        if: steps.gate.outputs.proceed == 'true'
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BYLINE_OVERRIDE: ${{ inputs.byline_override || steps.sentinel.outputs.byline }}
          TOPIC_KIND: ${{ inputs.topic_kind || steps.sentinel.outputs.topic }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '' }}
        run: |
          set +e
          node generate-office-post.js 2>&1 | tee /tmp/office.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Commit queue + audit log + bible extension
        if: steps.gate.outputs.proceed == 'true' && steps.gen.outputs.exit == '0' && inputs.dry_run != 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "Thiccctionary Office (auto)"
          git add data/office-post-queue.json data/office-events.json audits/social-quality.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit (likely skipped on quality)"
          else
            git commit -m "Wave 118 office post (auto): queue + bible + audit log"
            git pull --rebase origin main || true
            git push origin main
          fi

      - name: Post to Buffer
        id: bufpost
        if: steps.gate.outputs.proceed == 'true' && steps.gen.outputs.exit == '0' && inputs.dry_run != 'true'
        working-directory: scripts
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          SITE_BASE_URL: https://thiccctionary.com
          POST_MODE: office
        run: |
          set +e
          node post-to-buffer.js 2>&1 | tee /tmp/post.log
          POST_EXIT=${PIPESTATUS[0]}
          # Wave 206: fail loud if Buffer reported 0 successes. Previously this
          # silently passed with POST_EXIT swallowed, so a broken FB connection
          # (5/18 to 5/24) showed green on the dashboard for 8 days.
          if [ "$POST_EXIT" != "0" ]; then
            echo "::error title=Office post failed::post-to-buffer.js exited $POST_EXIT"
            exit $POST_EXIT
          fi
          if grep -E "Summary: 0 succeeded" /tmp/post.log >/dev/null 2>&1; then
            echo "::error title=Office post 0 successes::All Buffer channels rejected. See /tmp/post.log."
            exit 1
          fi
          echo "post exit: 0 (with at least one Buffer success)"

      - name: Commit queue status updates
        if: steps.gate.outputs.proceed == 'true' && steps.gen.outputs.exit == '0' && inputs.dry_run != 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "Thiccctionary Office (auto)"
          git add data/office-post-queue.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "queue unchanged"
          else
            git commit -m "Office post posted (status update)"
            git pull --rebase origin main || true
            git push origin main
          fi

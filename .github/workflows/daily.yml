name: Daily Thiccc — Generate Draft PR

# Generates a new entry once a day and opens a Pull Request for your review.
# Also builds a 9:16 vertical Reel-style MP4 alongside the entry, committed
# to /videos/<date>.mp4 — used by the post-on-merge workflow to cross-post
# to FB Reels and IG Reels via Buffer (TikTok-the-platform is skipped).
# Merge the PR (one tap on GitHub mobile) to publish.
on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC daily
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Replace today's entry if one already exists (otherwise the workflow exits early)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg (for video build)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Generate today's entry
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          FORCE_REGENERATE: ${{ inputs.force_regenerate || 'false' }}
        run: node generate-daily.js

      - name: Read entry metadata + design critique
        id: entry
        run: |
          DATE=$(date -u +%Y-%m-%d)
          WORD=$(node -e "const e=require('./data/entries.json'); console.log(e[0].word);")
          PHOTOG=$(node -e "const e=require('./data/entries.json'); console.log(e[0].photographer || 'unknown');")
          # Read critique if it exists (added by generate-daily.js as part of design review)
          # Read critique safely — never let a bad critique file break the PR step
          read_crit() {
            node -e "
              try {
                const c = JSON.parse(require('fs').readFileSync('./data/.critique.json','utf8'));
                console.log($1);
              } catch (e) { console.log($2); }
            " 2>/dev/null || echo $2
          }
          if [ -f data/.critique.json ]; then
            CRIT_SCORE=$(read_crit "c.score ?? '?'" "?")
            CRIT_VERDICT=$(read_crit "c.verdict || 'unknown'" "unknown")
            CRIT_TEXT=$(read_crit "(c.critique||'').replace(/[\\n\\r]/g,' ').slice(0,500)" "Critique unavailable")
          else
            CRIT_SCORE='?'
            CRIT_VERDICT='unknown'
            CRIT_TEXT='No critique available'
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "word=$WORD" >> $GITHUB_OUTPUT
          echo "photographer=$PHOTOG" >> $GITHUB_OUTPUT
          echo "crit_score=$CRIT_SCORE" >> $GITHUB_OUTPUT
          echo "crit_verdict=$CRIT_VERDICT" >> $GITHUB_OUTPUT
          # Multi-line output requires heredoc syntax
          echo "crit_text<<EOF" >> $GITHUB_OUTPUT
          echo "$CRIT_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build vertical Reel video
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATE: ${{ steps.entry.outputs.date }}
        run: node build-tiktok-video.js
        continue-on-error: true

      - name: Move MP4 to /videos/<date>.mp4
        run: |
          mkdir -p videos
          if ls scripts/tiktok-output/*.mp4 1>/dev/null 2>&1; then
            mv scripts/tiktok-output/*.mp4 "videos/${{ steps.entry.outputs.date }}.mp4"
            echo "Video committed: videos/${{ steps.entry.outputs.date }}.mp4"
            ls -la "videos/${{ steps.entry.outputs.date }}.mp4"
          else
            echo "No MP4 produced — skipping video commit. Reel cross-post will be skipped on merge."
          fi
        continue-on-error: true

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Daily entry: ${{ steps.entry.outputs.date }} — ${{ steps.entry.outputs.word }}"
          branch: daily/${{ steps.entry.outputs.date }}
          delete-branch: true
          title: "📖 ${{ steps.entry.outputs.word }} — ${{ steps.entry.outputs.date }}${{ steps.entry.outputs.crit_verdict == 'needs-review' && ' ⚠️ NEEDS REVIEW' || '' }}${{ steps.entry.outputs.crit_verdict == 'reject' && ' 🚫 REJECT?' || '' }}"
          body: |
            **Today's entry:** ${{ steps.entry.outputs.word }}
            **Photo by:** ${{ steps.entry.outputs.photographer }} (via Unsplash)

            ### 🎨 Design critique (auto)
            **Score:** ${{ steps.entry.outputs.crit_score }}/10 — **Verdict:** `${{ steps.entry.outputs.crit_verdict }}`

            > ${{ steps.entry.outputs.crit_text }}

            ---

            Review the image and copy in the **Files changed** tab. Open the new image to preview it.
            If a `videos/${{ steps.entry.outputs.date }}.mp4` is present, it will auto-cross-post as a FB+IG Reel on merge.

            **To publish:** click "Squash and merge" (or "Merge pull request").
            On merge, the site auto-deploys via Cloudflare Pages, and the Buffer post fires.

            **To skip today:** close this PR without merging. The branch will be auto-deleted.

            **To regenerate:** close this PR, then re-run "Daily Thiccc — Generate Draft PR" from the Actions tab.
          labels: |
            daily-entry

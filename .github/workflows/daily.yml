name: Daily Thiccc, Generate Draft PR

# Generates a new entry once a day and opens a Pull Request for your review.
# Also builds a 9:16 vertical Reel-style MP4 alongside the entry, committed
# to /videos/<date>.mp4, used by the post-on-merge workflow to cross-post
# to FB Reels and IG Reels via Buffer (TikTok-the-platform is skipped).
# Merge the PR (one tap on GitHub mobile) to publish.
on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC daily
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Replace today's entry if one already exists (otherwise the workflow exits early)"
        type: boolean
        default: false
  # Manual fire-from-anywhere trigger: touch data/.fire-daily and push.
  # Useful when the cron is failing and we need a daily entry to ship anyway.
  push:
    branches: [main]
    paths:
      - 'data/.fire-daily'

permissions:
  contents: write
  pull-requests: write

# Wave 168: prevent two daily runs racing each other. When the original
# 13:00 UTC cron fails, the failure-handler retries it - if BOTH eventually
# succeed, we get two competing PRs for the same date (PR #67 conflict).
# This concurrency group cancels any in-flight daily run when a new one
# starts, so only the latest attempt wins.
concurrency:
  group: daily-cron
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg (for video build)
        timeout-minutes: 3
        continue-on-error: true
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Fetch open daily/* branches
        # generate-daily.js reads these to avoid picking a subject that's already
        # pending merge in another PR. Without this, watermelon gets picked twice
        # in a row when yesterday's PR is unmerged at today's run.
        run: git fetch origin "+refs/heads/daily/*:refs/remotes/origin/daily/*" 2>&1 || true

      - name: Refill subject queue (Wave 105)
        working-directory: scripts
        run: node refill-subject-queue.js
        continue-on-error: true

      - name: Generate today's entry
        id: gen
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          FORCE_REGENERATE: ${{ inputs.force_regenerate || 'false' }}
        run: node generate-daily.js

      - name: Capture failure trace
        if: always() && failure()
        run: |
          mkdir -p audits/daily-failures
          if [ -f /tmp/daily-error.log ]; then
            cp /tmp/daily-error.log audits/daily-failures/$(date -u +%Y-%m-%d-%H%M%S).log
          fi
          # Also show in the workflow log
          echo "=== /tmp/daily-error.log ==="
          cat /tmp/daily-error.log 2>/dev/null || echo "(no error log)"
          # Commit if any failure log was captured
          if [ -d audits/daily-failures ] && [ "$(ls -A audits/daily-failures 2>/dev/null)" ]; then
            git config user.email "actions@github.com"
            git config user.name "Daily debug (auto)"
            git add audits/daily-failures/
            git diff --cached --quiet || (git commit -m "Daily failure trace" && git pull --rebase origin main && git push origin main || true)
          fi

      - name: Verify entry actually changed
        run: |
          # If generate-daily.js failed silently, entries.json[0].date won't match today.
          # Bail out before opening a stale PR.
          TODAY=$(date -u +%Y-%m-%d)
          NEW_DATE=$(node -e "const e=require('./data/entries.json'); console.log(e[0].date);")
          NEW_WORD=$(node -e "const e=require('./data/entries.json'); console.log(e[0].word);")
          if [ "$NEW_DATE" != "$TODAY" ]; then
            echo "::error::entries.json[0].date is $NEW_DATE, not today ($TODAY). Entry generation failed silently. Aborting."
            exit 1
          fi
          echo "Verified: today's entry is $NEW_WORD ($NEW_DATE)"

      - name: Read entry metadata + design critique
        id: entry
        run: |
          DATE=$(date -u +%Y-%m-%d)
          WORD=$(node -e "const e=require('./data/entries.json'); console.log(e[0].word);")
          PHOTOG=$(node -e "const e=require('./data/entries.json'); console.log(e[0].photographer || 'unknown');")
          # Wave 90: parse critique with python3 instead of bash+node-e heredoc.
          # The prior shell helper was fragile and rendered scores as literal "v"
          # in PR bodies. Also dumps the raw json to logs for debug.
          if [ -f data/.critique.json ]; then
            echo "--- raw .critique.json (debug) ---"
            cat data/.critique.json
            echo "--- end ---"
            CRIT_SCORE=$(python3 -c "import json; d=json.load(open('data/.critique.json')); s=d.get('score'); print(s if s is not None else '?')")
            CRIT_VERDICT=$(python3 -c "import json; d=json.load(open('data/.critique.json')); print(d.get('verdict') or 'unknown')")
            CRIT_TEXT=$(python3 -c "import json; d=json.load(open('data/.critique.json')); t=d.get('critique') or 'No critique provided.'; print(t.replace(chr(10),' ').replace(chr(13),' ')[:500])")
            CRIT_PHOTO_SUBJECT=$(python3 -c "import json; d=json.load(open('data/.critique.json')); print(d.get('photoSubject') or 'not described')")
          else
            CRIT_SCORE='?'
            CRIT_VERDICT='unknown'
            CRIT_TEXT='No critique available'
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "word=$WORD" >> $GITHUB_OUTPUT
          echo "photographer=$PHOTOG" >> $GITHUB_OUTPUT
          echo "crit_score=$CRIT_SCORE" >> $GITHUB_OUTPUT
          echo "crit_verdict=$CRIT_VERDICT" >> $GITHUB_OUTPUT
          echo "crit_photo_subject=$CRIT_PHOTO_SUBJECT" >> $GITHUB_OUTPUT
          # Multi-line output requires heredoc syntax
          echo "crit_text<<EOF" >> $GITHUB_OUTPUT
          echo "$CRIT_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prerender homepage with today's entry (Wave 179)
        working-directory: scripts
        run: node prerender-homepage.js
        continue-on-error: true

      - name: Prerender A-Z page from entries.json (Wave 180)
        working-directory: scripts
        run: node prerender-az.js
        continue-on-error: true

      - name: Build vertical Reel video
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATE: ${{ steps.entry.outputs.date }}
        run: node build-tiktok-video.js
        continue-on-error: true

      - name: Move MP4 to /videos/<date>.mp4
        # Wave 75: build-tiktok-video.js writes to <repo-root>/tiktok-output/, NOT
        # scripts/tiktok-output/, the prior path was wrong, so the MP4 was always
        # silently dropped. Now committed correctly into the daily PR.
        run: |
          mkdir -p videos
          if ls tiktok-output/*.mp4 1>/dev/null 2>&1; then
            mv tiktok-output/*.mp4 "videos/${{ steps.entry.outputs.date }}.mp4"
            echo "Video committed: videos/${{ steps.entry.outputs.date }}.mp4"
            ls -la "videos/${{ steps.entry.outputs.date }}.mp4"
          elif ls scripts/tiktok-output/*.mp4 1>/dev/null 2>&1; then
            mv scripts/tiktok-output/*.mp4 "videos/${{ steps.entry.outputs.date }}.mp4"
            echo "Video committed (legacy path): videos/${{ steps.entry.outputs.date }}.mp4"
            ls -la "videos/${{ steps.entry.outputs.date }}.mp4"
          else
            echo "::warning title=No MP4 produced::Video step likely failed. Reel cross-post will be skipped on merge."
            echo "Looked in: tiktok-output/ and scripts/tiktok-output/"
            ls -la tiktok-output/ 2>/dev/null || echo "  (tiktok-output/ does not exist)"
            ls -la scripts/tiktok-output/ 2>/dev/null || echo "  (scripts/tiktok-output/ does not exist)"
          fi
        continue-on-error: true

      - name: Open Pull Request
        id: open_pr
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Daily entry: ${{ steps.entry.outputs.date }}, ${{ steps.entry.outputs.word }}"
          branch: daily/${{ steps.entry.outputs.date }}
          delete-branch: true
          title: "📖 ${{ steps.entry.outputs.word }}, ${{ steps.entry.outputs.date }}${{ steps.entry.outputs.crit_verdict == 'needs-review' && ' ⚠️ NEEDS REVIEW' || '' }}${{ steps.entry.outputs.crit_verdict == 'reject' && ' 🚫 REJECT?' || '' }}"
          body: |
            **Today's entry:** ${{ steps.entry.outputs.word }}
            **Photo by:** ${{ steps.entry.outputs.photographer }} (via Unsplash)

            ### 🎨 Design critique (auto)
            **Score:** ${{ steps.entry.outputs.crit_score }}/10, **Verdict:** `${{ steps.entry.outputs.crit_verdict }}`

            **Photo actually depicts:** ${{ steps.entry.outputs.crit_photo_subject }}

            > ${{ steps.entry.outputs.crit_text }}

            ---

            Review the image and copy in the **Files changed** tab. Open the new image to preview it.
            If a `videos/${{ steps.entry.outputs.date }}.mp4` is present, it will auto-cross-post as a FB+IG Reel on merge.

            **To publish:** click "Squash and merge" (or "Merge pull request").
            On merge, the site auto-deploys via Cloudflare Pages, and the Buffer post fires.

            **To skip today:** close this PR without merging. The branch will be auto-deleted.

            **To regenerate:** close this PR, then re-run "Daily Thiccc, Generate Draft PR" from the Actions tab.
          labels: |
            daily-entry

      - name: Auto-merge when fired from admin (push event)
        if: success() && github.event_name == 'push' && steps.open_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.open_pr.outputs.pull-request-number }}
          echo "Auto-merging admin-fired PR #$PR..."
          gh pr merge "$PR" --squash --auto --delete-branch --repo "$GITHUB_REPOSITORY" || gh pr merge "$PR" --squash --delete-branch --repo "$GITHUB_REPOSITORY" || echo "::warning::auto-merge failed"


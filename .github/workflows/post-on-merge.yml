name: Post to Buffer on Daily Merge

# Triggers when a PR with the "daily-entry" label is merged into main.
# Pushes the day's new entry to Buffer for IG / FB / Twitter posting (morning slot)
# AND, if a video file exists for today, also posts a FB Reel + IG Reel.
# Sends the entry as a newsletter to Buttondown subscribers.
on:
  workflow_dispatch:
  pull_request:
    types: [closed]
  # Manual fire-from-anywhere: touch data/.fire-buffer and push.
  # Use when a daily entry was merged via direct push (bypassing the PR
  # merge event), so the social pipeline still fires.
  push:
    branches: [main]
    paths:
      - 'data/.fire-buffer'

jobs:
  post:
    # Run if EITHER a daily-entry PR was merged OR the sentinel file changed.
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'daily-entry'))
      || (github.event_name == 'push')
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve entry date
        id: target
        run: |
          # For PR merges: extract date from branch name (daily/YYYY-MM-DD)
          # For push triggers: use today's UTC date
          DATE=""
          if [ -n "${{ github.event.pull_request.head.ref }}" ]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
            # Extract YYYY-MM-DD from branch name like "daily/2026-05-10"
            DATE=$(echo "$BRANCH" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -n 1)
          fi
          if [ -z "$DATE" ]; then
            DATE=$(date -u +%Y-%m-%d)
          fi
          echo "Resolved entry date: $DATE"
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Wait for Cloudflare Pages deploy
        # Pages typically deploys in 30-90s after a push to main. Wait a bit so the image URL resolves.
        run: sleep 90

      - name: Post to Buffer (morning, image)
        working-directory: scripts
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          POST_MODE: morning
          TARGET_DATE: ${{ steps.target.outputs.date }}
        run: node post-to-buffer.js

      - name: Check if today's Reel video exists
        id: reel
        run: |
          DATE=${{ steps.target.outputs.date }}
          if [ -f "videos/$DATE.mp4" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Reel video found at videos/$DATE.mp4, will cross-post."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Reel video for $DATE. Skipping Reel cross-post."
          fi

      - name: Post to Buffer (Reel, FB + IG only)
        if: steps.reel.outputs.exists == 'true'
        working-directory: scripts
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          POST_MODE: reels
          TARGET_DATE: ${{ steps.target.outputs.date }}
        run: node post-to-buffer.js
        continue-on-error: true

      - name: Send newsletter to Buttondown subscribers
        working-directory: scripts
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          TARGET_DATE: ${{ steps.target.outputs.date }}
        run: node send-newsletter.js

name: Post-Deploy Verify

# Runs after each push to main. Waits for Cloudflare Pages to redeploy,
# then curls the live site and checks for markers that prove key features
# are still working. Fails loudly if something is broken — earlier in the
# session (commit 12c97405) a silent file truncation pushed broken HTML
# and nobody noticed until Christopher pulled up the live page. This
# guards that class of bug.

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloudflare Pages deploy
        # Bumped from 75s → 150s after run #162 (commit 57a9a3c) failed
        # during a burst-push day. CF Pages occasionally takes 90-120s to
        # deploy under load. 150s gives a comfortable buffer.
        run: sleep 150

      - name: Verify homepage hydrates and has key markers
        run: |
          set -e
          HOME=$(curl -sfL --retry 2 --retry-all-errors -A "Mozilla/5.0 (post-deploy-verify) AppleWebKit/537.36" https://thiccctionary.com/)
          echo "$HOME" | grep -q "</html>" || (echo "FAIL: homepage missing closing </html>" && exit 1)
          echo "$HOME" | grep -q "Thi<span" || (echo "FAIL: wordmark missing" && exit 1)
          echo "$HOME" | grep -q "What is this?" || (echo "FAIL: orientation strip missing" && exit 1)
          # Wave 110 guard: detect stray HTML fragments that escape from broken
          # span-wrapping or stale renders. These show up as visible text like
          # "ccc</span>span>", a bare "p>" on its own, etc.
          STRAY=$(echo "$HOME" | grep -oE '</(span|p|a|h[1-6]|strong|em)>(span|p|a|strong)>' | head -5 || true)
          if [ -n "$STRAY" ]; then
            echo "FAIL: stray HTML fragments visible on homepage:"
            echo "$STRAY"
            exit 1
          fi
          # Also check for bare ">word>" patterns (where word would render literally)
          BARE=$(echo "$HOME" | grep -oE '>[a-z]+>' | grep -vE '^>(td|tr|th|li|ol|ul|br|hr|img|input|link|meta|option|select|tbody|thead|nav|main|html|body|head|title|aside|article|section|header|footer|figure|figcaption|small|sub|sup|abbr|cite|code|kbd|q|s|u|i|b|del|ins|mark|wbr|time|var|samp|button|form|label|legend|fieldset|datalist|output|progress|meter|details|summary|dialog|video|audio|source|track|svg|path|rect|circle|line|polyline|polygon|text|tspan|defs|use|g|symbol|template|slot|noscript|style|script|colgroup|col|caption|address|blockquote|dd|dl|dt|figcaption|figure|menu|hgroup|picture|portal|search|map|area|object|param|embed|iframe|canvas|ruby|rb|rt|rp|bdo|bdi|data|dfn|pre)>' | head -5 || true)
          if [ -n "$BARE" ]; then
            echo "FAIL: bare angle-bracket-wrapped words visible on homepage (likely stray HTML):"
            echo "$BARE"
            exit 1
          fi
          echo "$HOME" | grep -q "ARTICLES:HOMEPAGE:START" || (echo "FAIL: editorial-desk sentinel missing" && exit 1)
          echo "$HOME" | grep -q "inline-signup" || (echo "FAIL: inline signup missing" && exit 1)
          echo "$HOME" | grep -q "fetch.*entries.json" || (echo "FAIL: hydration script missing" && exit 1)
          echo "Homepage OK"

      - name: Verify latest entry page renders
        run: |
          set -e
          # Get the date of the latest entry from entries.json on the live site
          LATEST=$(curl -sfL --retry 2 --retry-all-errors -A "Mozilla/5.0 (post-deploy-verify) AppleWebKit/537.36" https://thiccctionary.com/data/entries.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['date'])")
          echo "Latest entry: $LATEST"
          ENTRY=$(curl -sfL --retry 2 --retry-all-errors -A "Mozilla/5.0 (post-deploy-verify) AppleWebKit/537.36" "https://thiccctionary.com/entries/$LATEST.html")
          if ! echo "$ENTRY" | grep -q "</html>"; then
            echo "FAIL: entry page missing </html>"
            echo "--- first 5 lines of response: ---"
            echo "$ENTRY" | head -5
            echo "--- last 5 lines of response: ---"
            echo "$ENTRY" | tail -5
            echo "--- length: $(echo -n "$ENTRY" | wc -c) bytes ---"
            exit 1
          fi
          echo "$ENTRY" | grep -q "entry-subscribe" || (echo "FAIL: entry subscribe block missing" && exit 1)
          echo "$ENTRY" | grep -q "entry-nav" || (echo "FAIL: prev/next nav missing" && exit 1)
          echo "$ENTRY" | grep -q "BreadcrumbList" || (echo "FAIL: BreadcrumbList JSON-LD missing" && exit 1)
          echo "Entry page OK"

      - name: Verify RSS feed has both entries and articles
        run: |
          set -e
          FEED=$(curl -sfL --retry 2 --retry-all-errors -A "Mozilla/5.0 (post-deploy-verify) AppleWebKit/537.36" https://thiccctionary.com/feed.xml)
          ITEM_COUNT=$(echo "$FEED" | grep -c "<item>")
          ARTICLE_COUNT=$(echo "$FEED" | grep -c "\\[Article\\]")
          echo "Feed has $ITEM_COUNT items, $ARTICLE_COUNT articles"
          if [ "$ITEM_COUNT" -lt 9 ]; then echo "FAIL: too few items in feed" && exit 1; fi
          if [ "$ARTICLE_COUNT" -lt 1 ]; then echo "FAIL: no articles in feed" && exit 1; fi
          echo "RSS feed OK"

      - name: Verify compare and tags pages exist
        run: |
          set -e
          # Use full GET (not HEAD) with retries + Mozilla UA — Cloudflare's
          # bot-detect serves a 403/challenge to the curl-default UA on HEAD
          # checks, even though the page is fine for real users.
          UA="Mozilla/5.0 (post-deploy-verify) AppleWebKit/537.36"
          check_page() {
            local url="$1"
            local label="$2"
            local code
            code=$(curl -sIL --retry 2 --retry-all-errors -A "$UA" -o /dev/null -w "%{http_code}" "$url")
            case "$code" in
              200|301|302|304) echo "  $label OK ($code)" ;;
              *) echo "FAIL: $label returned $code"; return 1 ;;
            esac
          }
          check_page "https://thiccctionary.com/compare.html" "/compare.html"
          check_page "https://thiccctionary.com/tags/" "/tags/"
          check_page "https://thiccctionary.com/embed/today.html" "/embed/today.html"
          check_page "https://thiccctionary.com/random.html" "/random.html"
          echo "Feature pages OK"

      - name: Summary
        run: echo "✓ All post-deploy checks passed for $GITHUB_SHA"

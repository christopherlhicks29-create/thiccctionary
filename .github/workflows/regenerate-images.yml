name: Regenerate Images (Backfill Old Entries)

# Re-runs Unsplash + AI vision pick on existing entries, replacing their images
# with picks made by the tuned prompt. Manual-trigger only.
# Opens a single PR with all updated images for review.

on:
  workflow_dispatch:
    inputs:
      dates:
        description: "Comma-separated YYYY-MM-DD dates to regenerate, or 'all-except-today' (default)"
        type: string
        default: "all-except-today"

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate images
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          DATES: ${{ inputs.dates }}
        run: node regenerate-images.js

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Regenerate images for older entries (tuned prompt)"
          branch: regenerate-images/${{ github.run_id }}
          delete-branch: true
          title: "🖼️ Regenerated images — ${{ inputs.dates }}"
          body: |
            **What this PR does:** swaps the images on existing entries for fresh picks using the tuned vision prompt (rejects tight crops, requires the whole subject in frame).

            **Dates processed:** `${{ inputs.dates }}`

            Review the **Files changed** tab — open each new image and confirm it's better than what was there. If any pick looks weak, you can:
            - Close this PR (no changes go to main)
            - Or merge as-is and re-run the workflow for specific dates that need another pass

            **To merge:** Squash and merge as usual.

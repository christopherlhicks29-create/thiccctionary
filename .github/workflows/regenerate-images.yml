name: Regenerate Images (Backfill Old Entries)

# Re-runs Unsplash + AI vision pick on existing entries, replacing their images
# with picks made by the tuned prompt. Manual-trigger only.
# Opens a single PR with all updated images for review.

on:
  workflow_dispatch:
    inputs:
      dates:
        description: "Comma-separated YYYY-MM-DD dates to regenerate, or 'all-except-today' (default)"
        type: string
        default: "all-except-today"
      subject_override:
        description: "Optional. Hand-picked Unsplash search query for these dates (use when entry.word returns wrong-subject results, e.g. 'beefsteak tomato' for Heritage Tomato). Leave blank to use the entry's own word."
        type: string
        default: ""
  push:
    paths:
      - 'data/.fire-image-regen.json'
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read sentinel file (push triggers only)
        id: sentinel
        if: github.event_name == 'push'
        run: |
          if [ -f data/.fire-image-regen.json ]; then
            DATES=$(python3 -c "import json; print(json.load(open('data/.fire-image-regen.json')).get('dates',''))")
            SUBJECT=$(python3 -c "import json; print(json.load(open('data/.fire-image-regen.json')).get('subject_override',''))")
            echo "dates=${DATES}" >> $GITHUB_OUTPUT
            echo "subject_override=${SUBJECT}" >> $GITHUB_OUTPUT
          fi

      - name: Delete sentinel file (push triggers only)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f data/.fire-image-regen.json
          git add -A
          git diff --staged --quiet || git commit -m "Consume image-regen sentinel"
          git push origin main || true

      - name: Regenerate images
        working-directory: scripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          DATES: ${{ inputs.dates || steps.sentinel.outputs.dates }}
          SUBJECT_OVERRIDE: ${{ inputs.subject_override || steps.sentinel.outputs.subject_override }}
        run: node regenerate-images.js

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Regenerate images for older entries (tuned prompt)"
          branch: regenerate-images/${{ github.run_id }}
          delete-branch: true
          title: "🖼️ Regenerated images — ${{ inputs.dates }}${{ inputs.subject_override && format(' [query: {0}]', inputs.subject_override) || '' }}"
          body: |
            **What this PR does:** swaps the images on existing entries for fresh picks using the tuned vision prompt.

            **Dates processed:** `${{ inputs.dates }}`
            **Subject override:** `${{ inputs.subject_override }}` *(empty = use entry word)*

            Review the **Files changed** tab — open each new image and confirm it's better than what was there. If any pick looks weak, you can:
            - Close this PR (no changes go to main)
            - Or merge as-is and re-run the workflow with a different override for specific dates

            **To merge:** Squash and merge as usual.

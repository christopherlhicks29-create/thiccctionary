name: Character Reel cross-post (weekly)

# Picks an unposted Higgsfield character clip, posts it as a FB+IG Reel
# via Buffer with its pre-written deadpan caption. Recurring loop that
# converts Higgsfield credit spend into social cross-posts.
#
# Cadence: Saturdays 17:00 UTC (~11am MDT).
# Manual fire: touch data/.fire-character-reel and push, or workflow_dispatch.

on:
  schedule:
    - cron: '0 17 * * 6'   # Saturdays 17:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/.fire-character-reel'

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post one character clip via Buffer
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          SITE_BASE_URL: https://thiccctionary.com
        run: node scripts/post-character-reel.js

      - name: Commit tracker update + clear sentinel
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "Character Reel Bot"
          if [ -f data/.fire-character-reel ]; then
            git rm -f data/.fire-character-reel || true
          fi
          git add data/character-clips-posted.json || true
          if ! git diff --staged --quiet; then
            git commit -m "Character reel posted ($(date -u +%Y-%m-%d))"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then break; fi
              sleep $((i*3))
            done
          fi

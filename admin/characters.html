<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Character Clip Library - Thiccctionary Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream:#F4ECDC; --ink:#1A1410; --oxblood:#7A1F1F; --oxblood-soft:rgba(122,31,31,0.1);
    --rule:#d8cfb8;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--cream); color:var(--ink);
    font-family:'Inter',-apple-system,sans-serif; line-height:1.5; }
  .wrap { max-width:1280px; margin:0 auto; padding:30px 24px 80px; }
  h1 { font-family:'Fraunces',serif; font-weight:600; font-size:32px; margin:0 0 6px; }
  .sub { color:#6b5d4a; font-size:14px; margin-bottom:24px; }
  .back { display:inline-block; margin-bottom:14px; color:var(--oxblood); text-decoration:none;
    font-size:13px; border-bottom:1px solid var(--oxblood); }
  .summary { background:#fff; border:1px solid var(--rule); border-radius:6px;
    padding:14px 18px; margin-bottom:22px; display:flex; gap:32px; flex-wrap:wrap; }
  .summary .stat strong { display:block; font-size:22px; font-family:'Fraunces',serif; color:var(--ink); }
  .summary .stat span { font-size:12px; color:#6b5d4a; text-transform:uppercase; letter-spacing:0.05em; }
  .filters { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:18px; }
  .filters button { background:#fff; border:1px solid var(--rule); padding:6px 12px;
    border-radius:18px; font:inherit; font-size:13px; cursor:pointer; color:var(--ink); }
  .filters button.active { background:var(--oxblood); color:#fff; border-color:var(--oxblood); }
  .char-section { margin:32px 0 16px; }
  .char-section h2 { font-family:'Fraunces',serif; font-size:22px; margin:0 0 4px; }
  .char-section .look { font-size:13px; color:#6b5d4a; font-style:italic; margin-bottom:14px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
  .card { background:#fff; border:1px solid var(--rule); border-radius:6px; overflow:hidden;
    display:flex; flex-direction:column; }
  .card video, .card img { width:100%; aspect-ratio:9/16; object-fit:cover; background:#000;
    display:block; }
  .card-body { padding:10px 12px 12px; }
  .card-body .action { font-size:14px; font-weight:500; margin:0 0 4px; line-height:1.3; }
  .card-body .meta { font-size:11px; color:#6b5d4a; text-transform:uppercase; letter-spacing:0.04em;
    margin-bottom:8px; }
  .card-body .path { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11px;
    background:#f8f1de; padding:5px 7px; border-radius:3px; word-break:break-all; color:#3a2f1f;
    margin-bottom:8px; cursor:copy; }
  .card-body .path:hover { background:#efe3c3; }
  .card-body .actions { display:flex; gap:6px; }
  .card-body .actions a, .card-body .actions button { font-size:11px; padding:5px 10px;
    border:1px solid var(--rule); background:#fff; border-radius:3px; text-decoration:none;
    color:var(--ink); cursor:pointer; font:inherit; }
  .card-body .actions a:hover, .card-body .actions button:hover { background:#f8f1de; }

  .card.flagged { border-color:#9b2c2c; opacity:0.85; }
  .flag-banner { background:#9b2c2c; color:#fff; padding:6px 10px; font-size:11px;
    text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
  .empty { color:#6b5d4a; font-style:italic; padding:24px 0; text-align:center; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--cream); padding:10px 18px; border-radius:24px;
    font-size:13px; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div class="wrap">
  <a href="/admin/" class="back">&larr; Back to admin</a>
  <h1>Character Clip Library</h1>
  <div class="sub">Higgsfield-generated cast videos. Click a card to copy its repo path, then paste it into any HTML page as <code>&lt;video src="/PATH"&gt;</code>.</div>

  <div class="summary" id="summary"></div>
  <div class="filters" id="filters"></div>
  <div id="sections"></div>
</div>
<div class="toast" id="toast">Path copied</div>

<script>
async function load() {
  const res = await fetch('/data/character-clips.json', {cache:'no-store'});
  const data = await res.json();
  window._charData = data;

  // Summary
  const totalCredits = data.clips.reduce((a,c)=>a+c.credits,0);
  document.getElementById('summary').innerHTML = `
    <div class="stat"><strong>${data.clips.length}</strong><span>clips</span></div>
    <div class="stat"><strong>${data.portraits.length}</strong><span>portraits</span></div>
    <div class="stat"><strong>${data.characters.length}</strong><span>characters</span></div>
    <div class="stat"><strong>${totalCredits.toFixed(0)}</strong><span>credits spent</span></div>
  `;

  // Filters
  const filters = ['all', ...data.characters.map(c=>c.id)];
  const fEl = document.getElementById('filters');
  fEl.innerHTML = filters.map(f =>
    `<button data-filter="${f}" class="${f==='all'?'active':''}">${f==='all'?'All':data.characters.find(c=>c.id===f).name.split(',')[0]}</button>`
  ).join('');
  fEl.addEventListener('click', e => {
    if (e.target.tagName !== 'BUTTON') return;
    fEl.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    render(e.target.dataset.filter);
  });

  render('all');
}

function render(filter) {
  const data = window._charData;
  const sections = document.getElementById('sections');
  const chars = filter==='all' ? data.characters : data.characters.filter(c=>c.id===filter);
  sections.innerHTML = chars.map(char => {
    const clips = data.clips.filter(c=>c.char===char.id);
    const ports = data.portraits.filter(p=>p.char.startsWith(char.id));
    if (clips.length === 0 && ports.length === 0) return '';
    return `
      <div class="char-section">
        <h2>${char.name}</h2>
        <div class="look">${char.look}</div>
        <div class="grid">
          ${ports.map(p => `
            <div class="card">
              <img src="/${p.path}" alt="${char.name}">
              <div class="card-body">
                <p class="action">Portrait still</p>
                <div class="meta">${p.date} &middot; nano_banana_2</div>
                <div class="path" data-copy="/${p.path}">/${p.path}</div>
                <div class="actions">
                  <a href="/${p.path}" target="_blank">Open</a>
                  <button data-copy="/${p.path}">Copy path</button>
                </div>
              </div>
            </div>
          `).join('')}
          ${clips.map(c => `
            <div class="card${c.flagged?' flagged':''}">
              ${c.flagged ? `<div class="flag-banner">FLAGGED &mdash; ${c.flagged}</div>` : ''}
              <video src="/${c.path}" controls preload="metadata" muted></video>
              <div class="card-body">
                <p class="action">${c.action}</p>
                <div class="meta">${c.date} &middot; ${c.model} &middot; ${c.credits} credits</div>
                <div class="path" data-copy="/${c.path}">/${c.path}</div>
                <div class="actions">
                  <a href="/${c.path}" target="_blank">Open</a>
                  <button data-copy="/${c.path}">Copy path</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('') || '<div class="empty">No clips match this filter.</div>';

  // Wire copy handlers
  sections.querySelectorAll('[data-copy]').forEach(el => {
    el.addEventListener('click', () => copyPath(el.dataset.copy));
  });
}

function copyPath(path) {
  navigator.clipboard.writeText(path).then(() => {
    const t = document.getElementById('toast');
    t.textContent = 'Copied: ' + path;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1400);
  });
}

load();
</script>
</body>
</html>

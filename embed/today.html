<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Today's Thiccctionary entry — embeddable</title>
<meta name="description" content="An embeddable widget showing the latest Thiccctionary entry. Add it to your blog or site." />
<meta name="robots" content="noindex" />
<link rel="canonical" href="https://thiccctionary.com/embed/today.html" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #f4ecdc;
    --cream-deep: #ebe0c8;
    --ink: #1a1410;
    --ink-soft: #4a3d33;
    --oxblood: #7a1f1f;
    --rule: rgba(26, 20, 16, 0.18);
    --font-display: 'Fraunces', 'Times New Roman', serif;
    --font-body: 'Newsreader', Georgia, serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    line-height: 1.6;
  }
  .embed-card {
    background: var(--cream);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    max-width: 600px;
    margin: 0 auto;
  }
  .embed-header {
    padding: 14px 18px 8px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-family: 'Courier New', monospace;
  }
  .embed-header strong {
    color: var(--oxblood);
    font-weight: normal;
    letter-spacing: 0.18em;
  }
  .embed-body {
    padding: 18px;
    display: flex;
    gap: 18px;
    align-items: flex-start;
  }
  @media (max-width: 480px) {
    .embed-body { flex-direction: column; }
  }
  .embed-image {
    flex: 0 0 180px;
    aspect-ratio: 1;
    background: linear-gradient(135deg, #d4a574, #7a1f1f);
    background-size: cover;
    background-position: center;
    border-radius: 3px;
  }
  @media (max-width: 480px) {
    .embed-image { flex: 0 0 auto; width: 100%; aspect-ratio: 16/9; }
  }
  .embed-text { flex: 1; min-width: 0; }
  .embed-word {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 24px;
    line-height: 1.15;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .embed-pron {
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    margin: 0 0 10px;
  }
  .embed-def {
    font-size: 14px;
    line-height: 1.5;
    margin: 0 0 12px;
    color: var(--ink);
  }
  .embed-footer {
    padding: 10px 18px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    background: var(--cream-deep);
  }
  .embed-footer a {
    color: var(--oxblood);
    text-decoration: none;
    font-weight: 600;
  }
  .embed-footer a:hover { text-decoration: underline; }
  .embed-brand {
    color: var(--ink-soft);
    font-style: italic;
  }
  .ccc { color: var(--oxblood); font-style: italic; }
</style>
</head>
<body>

<div class="embed-card">
  <div class="embed-header">
    <span>Today on <strong>Thi<span class="ccc">ccc</span>tionary</strong></span>
    <span id="embed-date">—</span>
  </div>
  <div class="embed-body">
    <div class="embed-image" id="embed-image"></div>
    <div class="embed-text">
      <h2 class="embed-word" id="embed-word">Loading…</h2>
      <p class="embed-pron" id="embed-pron"></p>
      <p class="embed-def" id="embed-def"></p>
    </div>
  </div>
  <div class="embed-footer">
    <a id="embed-link" href="https://thiccctionary.com/" target="_blank" rel="noopener">Read the full entry →</a>
    <span class="embed-brand">thiccctionary.com</span>
  </div>
</div>

<script>
(async function () {
  try {
    const res = await fetch('https://thiccctionary.com/data/entries.json', { cache: 'no-store' });
    const entries = await res.json();
    if (!entries.length) return;
    entries.sort((a, b) => new Date(b.date) - new Date(a.date));
    const e = entries[0];
    const dateStr = new Date(e.date + 'T12:00:00Z').toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC'
    });
    document.getElementById('embed-date').textContent = dateStr;
    document.getElementById('embed-word').textContent = e.word;
    document.getElementById('embed-pron').textContent = (e.pronunciation || '') + ' n.';
    const def = String(e.definitions[0] || '').replace(/<[^>]+>/g, '');
    document.getElementById('embed-def').textContent = def.length > 220 ? def.slice(0, 219) + '…' : def;
    if (e.image) {
      document.getElementById('embed-image').style.backgroundImage = `url(https://thiccctionary.com/${e.image.replace(/^\.?\//,'')})`;
    }
    document.getElementById('embed-link').href = `https://thiccctionary.com/entries/${e.date}.html`;
    // Highlight ccc in the word client-side
    const w = document.getElementById('embed-word');
    w.innerHTML = w.textContent.replace(/(?<![cC])([cC]{3})(?![cC])/g, '<span class="ccc">$1</span>');
  } catch (err) {
    document.getElementById('embed-word').textContent = 'Thiccctionary';
    document.getElementById('embed-def').textContent = 'A satirical daily dictionary of objects of unusual girth.';
    document.getElementById('embed-link').textContent = 'Visit the site →';
  }
})();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  });
}
</script>
<script defer src="/scripts/mobile-nav.js"></script>
</body>
</html>
